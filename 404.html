<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Andrew Zvoma</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F9F8F5;--surface:#fff;--ink:#1A1916;--ink-muted:#5C5B55;--ink-faint:#A8A69F;--accent:#2952e3;--accent-light:rgba(41,82,227,0.08);--border:rgba(26,25,22,0.1);--radius-lg:16px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
h1{font-family:'Syne',sans-serif;font-size:6rem;font-weight:700;color:var(--accent);line-height:1;margin-bottom:1rem;opacity:.15}
h2{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:600;margin-bottom:.75rem}
p{color:var(--ink-muted);font-size:.95rem;max-width:420px;line-height:1.7;margin-bottom:2rem}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;font-weight:600;font-size:.9rem;padding:12px 28px;border-radius:8px;text-decoration:none;margin:.4rem}
.btn.outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}
nav{position:fixed;top:0;left:0;right:0;padding:0 2rem;height:64px;display:flex;align-items:center;border-bottom:1px solid var(--border);background:rgba(249,248,245,0.94);backdrop-filter:blur(16px)}
.nav-logo{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:600;color:var(--ink);text-decoration:none}
</style>
</head>
<body>
<nav><a class="nav-logo" href="/">Andrew Zvoma</a></nav>
<h1>404</h1>
<h2>Page not found</h2>
<p>The page you're looking for doesn't exist or may have moved. Try heading back to the homepage or browsing the case studies.</p>
<div>
  <a href="/" class="btn">Go to Homepage</a>
  <a href="/case-studies" class="btn outline">View Case Studies</a>
</div>
</body>
</html>
